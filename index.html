<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minh Do | Product Designer</title>
    <script>
        (() => {
            try {
                const storageKey = 'portfolio-theme';
                const storedTheme = localStorage.getItem(storageKey);
                const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
                const theme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : systemTheme;

                document.documentElement.dataset.theme = theme;
                document.documentElement.classList.toggle('dark', theme === 'dark');
                document.documentElement.style.colorScheme = theme;
            } catch {
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
    <style>
        html[data-theme='dark'],
        html[data-theme='dark'] body {
            background: #0f1011;
            color: #f3f4f6;
        }
    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'accent-blue': '#0033FF',
                        'accent-yellow': '#FFD500',
                        'accent-magenta': '#AF0C6E',
                        'accent-black': '#111111',
                        'gray-bg': '#F5F5F5',
                    },
                    keyframes: {
                        subtleDrift: {
                            '0%': { backgroundPosition: '0px 0px' },
                            '100%': { backgroundPosition: '24px 24px' },
                        }
                    },
                    animation: {
                        subtleDrift: 'subtleDrift 5s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom utilities that are cleaner in CSS than inline styles for specific bg patterns */
        .animated-dots-bg {
            background-image: radial-gradient(circle, #E5E7EB 1.5px, transparent 1.5px);
            background-size: 24px 24px;
        }
        /* Hide scrollbar for cleaner look if needed, though not strictly requested */
        body {
            -webkit-font-smoothing: antialiased;
        }
    </style>
